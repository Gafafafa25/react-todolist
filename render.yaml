services:
  - type: web
    name: react-todolist-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: server-psql
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: react-todolist-db
          property: connectionString

  - type: web
    name: react-todolist-frontend
    runtime: static
    plan: free
    buildCommand: npm install && npm run build
#    startCommand: npm run dev
#    rootDir: server-psql
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: react-todolist-api
          type: web
          property: hostport
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: react-todolist-db
    databaseName: react_todolist
    plan: free
    ipAllowList: []


